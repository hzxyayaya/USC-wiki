name: Deploy to Tencent COS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-tencent-cos
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload to COS
    runs-on: ubuntu-latest

    env:
      COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
      COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
      COS_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=0
          for name in COS_BUCKET COS_REGION COS_SECRET_ID COS_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=缺少 Secret::$name 未配置或为空，请在 GitHub → Settings → Secrets 中填写"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "COS bucket: $COS_BUCKET"
          echo "COS region: $COS_REGION"
          if [ -n "$SITE_URL" ]; then
            echo "Site URL: $SITE_URL"
          else
            echo "Site URL: 未配置 SITE_URL，构建时使用默认地址（不影响上传）"
            echo "访问地址通常为: https://${COS_BUCKET}.cos-website.${COS_REGION}.myqcloud.com"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: |
          if [ -n "$SITE_URL" ]; then
            export SITE="$SITE_URL"
          fi
          pnpm build

      - name: Setup coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a "$COS_SECRET_ID" \
            -s "$COS_SECRET_KEY" \
            -b "$COS_BUCKET" \
            -r "$COS_REGION"

      - name: Upload dist to COS
        run: coscmd upload -r --sync dist/ /
