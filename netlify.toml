[build]
  command = "pnpm build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max-old-space-size=4096"
  SITE = "https://usc-wiki.netlify.app"
  NEXT_PUBLIC_SITE_URL = "https://usc-wiki.netlify.app"

# Next.js 静态导出（output: 'export'）：产物在 out/，无需 @netlify/plugin-nextjs
